<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Schedule Optimizer</title>
  <meta name="description"
    content="AI-powered schedule optimization interface for learning and productivity planning." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #16213e;
      --accent-primary: #e94560;
      --accent-secondary: #f5a623;
      --accent-tertiary: #0f3460;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0b0;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      --morning: #f5a623;
      --work: #4b4dbf;
      --meals: #5cb67a;
      --activity: #f06a5d;
      --wind: #25325f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 12% 12%, rgba(233, 69, 96, 0.18), transparent 32%),
        radial-gradient(circle at 84% 24%, rgba(245, 166, 35, 0.18), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(15, 52, 96, 0.28), transparent 42%),
        var(--bg-primary);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        linear-gradient(transparent 96%, rgba(255, 255, 255, 0.15) 96%),
        linear-gradient(90deg, transparent 96%, rgba(255, 255, 255, 0.1) 96%);
      background-size: 20px 20px;
    }

    .page {
      width: min(1200px, 94vw);
      margin: 0 auto;
      padding: 40px 0 30px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeUp 0.7s ease both;
    }

    .header h1 {
      margin: 0;
      font-family: "DM Serif Display", serif;
      letter-spacing: 0.2px;
      font-size: clamp(1.8rem, 4.5vw, 3rem);
    }

    .header p {
      margin: 12px auto 0;
      color: var(--text-secondary);
      font-size: clamp(0.95rem, 2vw, 1.12rem);
    }

    .separator {
      width: 300px;
      max-width: 76%;
      height: 4px;
      margin: 16px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg,
          rgba(233, 69, 96, 0),
          var(--accent-primary),
          var(--accent-secondary),
          rgba(245, 166, 35, 0));
      background-size: 160% 100%;
      animation: underlineShift 3.2s linear infinite;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(320px, 1fr) minmax(360px, 1fr);
    }

    .card {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      min-height: 680px;
      padding: 22px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
      animation: fadeUp 0.7s ease both;
    }

    .card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .card:hover {
      background-color: var(--bg-card-hover);
      transform: translateY(-2px);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
    }

    .toggle-wrap {
      position: relative;
      display: flex;
      border-radius: 999px;
      padding: 4px;
      background: rgba(15, 52, 96, 0.35);
      border: 1px solid var(--border);
      margin-bottom: 18px;
    }

    .toggle-indicator {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      border-radius: 999px;
      background: linear-gradient(120deg, rgba(233, 69, 96, 0.8), rgba(245, 166, 35, 0.85));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .toggle-wrap[data-role="professional"] .toggle-indicator {
      transform: translateX(calc(100% + 4px));
    }

    .role-btn {
      position: relative;
      z-index: 1;
      flex: 1;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--text-primary);
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .role-btn:hover {
      transform: translateY(-2px);
    }

    .inputs-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 0.86rem;
      color: var(--text-secondary);
      transition: opacity 0.25s ease;
    }

    .field input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      border: 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px 10px 0 0;
      padding: 10px 10px 9px;
      outline: none;
      transition: border-color 0.25s ease, transform 0.2s ease;
      font-family: "DM Sans", sans-serif;
    }

    .field input:focus {
      border-bottom-color: var(--accent-secondary);
      transform: translateY(-1px);
    }

    .field input[type="time"] {
      font-family: "JetBrains Mono", monospace;
    }

    .extra-activities {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .extra-activities h3 {
      margin: 0 0 12px;
      font-size: 0.98rem;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.22s ease, background-color 0.22s ease;
    }

    .activity-item:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.04);
    }

    .activity-item input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      display: grid;
      place-items: center;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .check svg {
      width: 13px;
      height: 13px;
      transform: scale(0);
      transform-origin: center;
    }

    .activity-item input:checked+.check {
      background: linear-gradient(140deg, var(--accent-primary), var(--accent-secondary));
      border-color: transparent;
    }

    .activity-item input:checked+.check svg {
      transform: scale(1);
      animation: checkPop 0.3s ease;
    }

    .activity-meta {
      display: flex;
      flex: 1;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-primary);
      font-size: 0.94rem;
    }

    .activity-meta small {
      color: var(--text-secondary);
    }

    .cta-wrap {
      margin-top: 18px;
    }

    .generate-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      font-size: 0.97rem;
      padding: 13px 16px;
      background: linear-gradient(120deg, var(--accent-primary), var(--accent-secondary));
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }

    .generate-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.35),
          transparent);
      transition: left 0.55s ease;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(233, 69, 96, 0.35);
    }

    .generate-btn:hover::before {
      left: 110%;
    }

    .generate-btn:disabled {
      cursor: wait;
      opacity: 0.9;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple 0.55s linear;
      background: rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .output-card {
      display: flex;
      flex-direction: column;
    }

    .state {
      flex: 1;
      display: none;
      border-radius: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.015);
      padding: 18px;
    }

    .state.active {
      display: block;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty .clock {
      font-size: 2.1rem;
      margin-bottom: 10px;
    }

    .loading-wrap {
      display: grid;
      gap: 10px;
    }

    .skeleton {
      height: 16px;
      border-radius: 8px;
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 0.06) 10%,
          rgba(255, 255, 255, 0.18) 50%,
          rgba(255, 255, 255, 0.06) 90%);
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .block {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transform: translateX(-10px);
      opacity: 0;
      animation: slideIn 0.45s ease forwards;
    }

    .block-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .pill {
      width: 8px;
      height: 32px;
      border-radius: 999px;
    }

    .block-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .block-time,
    .duration,
    .summary strong {
      font-family: "JetBrains Mono", monospace;
    }

    .block-time {
      font-size: 0.83rem;
      color: var(--text-secondary);
    }

    .duration {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .summary {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .morning {
      background: rgba(245, 166, 35, 0.12);
    }

    .morning .pill {
      background: var(--morning);
    }

    .work {
      background: rgba(75, 77, 191, 0.13);
    }

    .work .pill {
      background: var(--work);
    }

    .meals {
      background: rgba(92, 182, 122, 0.12);
    }

    .meals .pill {
      background: var(--meals);
    }

    .activities {
      background: rgba(240, 106, 93, 0.12);
    }

    .activities .pill {
      background: var(--activity);
    }

    .wind {
      background: rgba(37, 50, 95, 0.32);
    }

    .wind .pill {
      background: #5b6aa5;
    }

    .mono {
      font-family: "JetBrains Mono", monospace;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 0;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: 95vw;
        padding-top: 24px;
        padding-bottom: 90px;
      }

      .inputs-grid {
        grid-template-columns: 1fr;
      }

      .cta-wrap {
        position: sticky;
        bottom: 10px;
        z-index: 6;
        backdrop-filter: blur(8px);
        padding-top: 10px;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes underlineShift {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 160% 50%;
      }
    }

    @keyframes checkPop {
      0% {
        transform: scale(0.45);
      }

      70% {
        transform: scale(1.14);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 180% 0;
      }

      100% {
        background-position: -20% 0;
      }
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <h1>AI-Powered Schedule Optimization for Your Learning Journey</h1>
      <p>Tell us your routine - we'll build the perfect timetable</p>
      <div class="separator"></div>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Schedule Setup</h2>

        <div class="toggle-wrap" data-role="student" id="roleToggle">
          <div class="toggle-indicator"></div>
          <button class="role-btn" type="button" data-role="student">
            Student
          </button>
          <button class="role-btn" type="button" data-role="professional">
            Professional
          </button>
        </div>

        <form id="scheduleForm">
          <div class="inputs-grid">
            <div class="field">
              <label for="wakeTime">Wake-up Time</label>
              <input id="wakeTime" type="time" value="06:30" required />
            </div>

            <div class="field">
              <label for="freshup">Fresh-up Time (minutes)</label>
              <input id="freshup" type="number" min="0" value="30" required />
            </div>

            <div class="field">
              <label id="startLabel" for="startTime">
                College Start Time
              </label>
              <input id="startTime" type="time" value="09:00" required />
            </div>

            <div class="field">
              <label id="endLabel" for="endTime">
                College End Time
              </label>
              <input id="endTime" type="time" value="17:00" required />
            </div>

            <div class="field">
              <label for="morningTravel">Morning Travel (minutes)</label>
              <input id="morningTravel" type="number" min="0" value="30" required />
            </div>

            <div class="field">
              <label for="eveningTravel">Evening Travel (minutes)</label>
              <input id="eveningTravel" type="number" min="0" value="30" required />
            </div>
          </div>

          <section class="extra-activities">
            <h3>Extra Activities</h3>

            <label class="activity-item">
              <input type="checkbox" value="Gym/Fitness" data-duration="60" data-icon="🏋️" />
              <span class="check">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 8.5L6.5 12L13 4" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
              <span class="activity-meta">
                <span>🏋️ Gym/Fitness</span>
                <small>60 min</small>
              </span>
            </label>

            <label class="activity-item">
              <input type="checkbox" value="Music Classes" data-duration="90" data-icon="🎵" />
              <span class="check">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 8.5L6.5 12L13 4" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
              <span class="activity-meta">
                <span>🎵 Music Classes</span>
                <small>90 min</small>
              </span>
            </label>

            <label class="activity-item">
              <input type="checkbox" value="Social Activities" data-duration="120" data-icon="🤝" />
              <span class="check">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 8.5L6.5 12L13 4" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
              <span class="activity-meta">
                <span>🤝 Social Activities</span>
                <small>120 min</small>
              </span>
            </label>

            <label class="activity-item">
              <input type="checkbox" value="Additional Commute" data-duration="60" data-icon="🚗" />
              <span class="check">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 8.5L6.5 12L13 4" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </span>
              <span class="activity-meta">
                <span>🚗 Additional Commute</span>
                <small>60 min</small>
              </span>
            </label>
          </section>

          <div class="cta-wrap">
            <button id="generateBtn" class="generate-btn" type="submit">
              Generate AI Schedule
            </button>
          </div>
        </form>
      </article>

      <article class="card output-card">
        <h2>Generated Schedule</h2>

        <section id="emptyState" class="state active">
          <div class="empty">
            <div>
              <div class="clock">🕒</div>
              <div>Click "Generate AI Schedule" to create your personalized timetable</div>
            </div>
          </div>
        </section>

        <section id="loadingState" class="state">
          <div class="loading-wrap">
            <div class="mono">AI is crafting your schedule...</div>
            <div class="skeleton" style="width: 90%"></div>
            <div class="skeleton" style="width: 75%"></div>
            <div class="skeleton" style="width: 100%"></div>
            <div class="skeleton" style="width: 86%"></div>
            <div class="skeleton" style="width: 65%"></div>
          </div>
        </section>

        <section id="resultState" class="state">
          <div id="timeline" class="timeline"></div>
          <div id="summary" class="summary"></div>
        </section>
      </article>
    </section>
  </main>

  <script>
    const form = document.getElementById("scheduleForm");
    const roleToggle = document.getElementById("roleToggle");
    const roleButtons = Array.from(document.querySelectorAll(".role-btn"));
    const startLabel = document.getElementById("startLabel");
    const endLabel = document.getElementById("endLabel");
    const generateBtn = document.getElementById("generateBtn");

    const emptyState = document.getElementById("emptyState");
    const loadingState = document.getElementById("loadingState");
    const resultState = document.getElementById("resultState");
    const timelineEl = document.getElementById("timeline");
    const summaryEl = document.getElementById("summary");

    let currentRole = "student";

    function setRole(role) {
      currentRole = role;
      roleToggle.setAttribute("data-role", role);
      startLabel.style.opacity = "0.3";
      endLabel.style.opacity = "0.3";

      setTimeout(() => {
        const startText = role === "professional" ? "Work Start Time" : "College Start Time";
        const endText = role === "professional" ? "Work End Time" : "College End Time";
        startLabel.textContent = startText;
        endLabel.textContent = endText;
        startLabel.style.opacity = "1";
        endLabel.style.opacity = "1";
      }, 130);
    }

    roleButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setRole(button.dataset.role);
      });
    });

    function setState(stateName) {
      const states = [emptyState, loadingState, resultState];
      states.forEach((state) => state.classList.remove("active"));

      if (stateName === "loading") loadingState.classList.add("active");
      if (stateName === "result") resultState.classList.add("active");
      if (stateName === "empty") emptyState.classList.add("active");
    }

    function toMinutes(time) {
      const [h, m] = time.split(":").map(Number);
      return h * 60 + m;
    }

    function toClock(totalMinutes) {
      const minutes = Math.max(0, Math.min(1439, Math.floor(totalMinutes)));
      const h = Math.floor(minutes / 60)
        .toString()
        .padStart(2, "0");
      const m = (minutes % 60).toString().padStart(2, "0");
      return h + ":" + m;
    }

    function formatDuration(mins) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h && m) return h + "h " + m + "m";
      if (h) return h + "h";
      return m + "m";
    }

    function addBlock(list, block) {
      const start = Math.max(0, Math.floor(block.start));
      const end = Math.min(1440, Math.floor(block.end));
      if (end <= start) return;
      list.push({ ...block, start, end });
    }

    function generateSchedule(data) {
      const schedule = [];
      const wake = toMinutes(data.wakeTime);
      const freshup = Number(data.freshup);
      const startTime = toMinutes(data.startTime);
      const endTime = toMinutes(data.endTime);
      const morningTravel = Number(data.morningTravel);
      const eveningTravel = Number(data.eveningTravel);

      let cursor = wake;

      addBlock(schedule, {
        icon: "🌅",
        label: "Morning Routine",
        start: cursor,
        end: cursor + freshup,
        type: "morning"
      });
      cursor += freshup;

      addBlock(schedule, {
        icon: "🛣️",
        label: "Morning Commute",
        start: cursor,
        end: cursor + morningTravel,
        type: "work"
      });
      cursor += morningTravel;

      const lunchMid = startTime + Math.floor((endTime - startTime) / 2);
      const lunchStart = Math.max(startTime + 60, Math.min(lunchMid - 30, endTime - 60));
      const lunchEnd = lunchStart + 60;

      addBlock(schedule, {
        icon: "🎓",
        label: currentRole === "professional" ? "Work Session" : "College Session",
        start: startTime,
        end: lunchStart,
        type: "work"
      });

      addBlock(schedule, {
        icon: "🍽️",
        label: "Lunch",
        start: lunchStart,
        end: lunchEnd,
        type: "meals"
      });

      addBlock(schedule, {
        icon: "🎯",
        label: currentRole === "professional" ? "Work Session" : "College Session",
        start: lunchEnd,
        end: endTime,
        type: "work"
      });

      cursor = endTime;
      addBlock(schedule, {
        icon: "🚇",
        label: "Evening Commute",
        start: cursor,
        end: cursor + eveningTravel,
        type: "work"
      });

      cursor += eveningTravel;

      const sortedActivities = data.activities
        .slice()
        .sort((a, b) => b.duration - a.duration);

      sortedActivities.forEach((activity) => {
        addBlock(schedule, {
          icon: activity.icon,
          label: activity.name,
          start: cursor,
          end: cursor + activity.duration,
          type: "activities"
        });
        cursor += activity.duration;
      });

      addBlock(schedule, {
        icon: "🍽️",
        label: "Dinner",
        start: cursor,
        end: cursor + 45,
        type: "meals"
      });
      cursor += 45;

      addBlock(schedule, {
        icon: "🌙",
        label: "Wind-down",
        start: cursor,
        end: cursor + 30,
        type: "wind"
      });
      cursor += 30;

      const sleepStart = Math.min(cursor, 1440);
      addBlock(schedule, {
        icon: "😴",
        label: "Sleep",
        start: sleepStart,
        end: 1440,
        type: "wind"
      });

      schedule.sort((a, b) => a.start - b.start);

      const awakeEnd = sleepStart;
      const awakeDuration = Math.max(awakeEnd - wake, 0);
      const busyAwake = schedule
        .filter((block) => block.label !== "Sleep")
        .reduce((sum, block) => {
          const start = Math.max(block.start, wake);
          const end = Math.min(block.end, awakeEnd);
          return end > start ? sum + (end - start) : sum;
        }, 0);

      const freeTime = Math.max(awakeDuration - busyAwake, 0);
      const sleepMins = Math.max(1440 - sleepStart, 0);

      return {
        timeline: schedule,
        freeTime,
        sleepMins
      };
    }

    function renderResult(payload) {
      timelineEl.innerHTML = "";

      payload.timeline.forEach((block, index) => {
        const el = document.createElement("article");
        el.className = "block " + block.type;
        el.style.animationDelay = index * 70 + "ms";
        const duration = block.end - block.start;

        el.innerHTML =
          '<div class="block-left">' +
          '<span class="pill"></span>' +
          "<div>" +
          '<div class="block-title">' +
          block.icon +
          " " +
          block.label +
          "</div>" +
          '<div class="block-time">' +
          toClock(block.start) +
          " - " +
          toClock(block.end) +
          "</div>" +
          "</div>" +
          "</div>" +
          '<div class="duration">' +
          formatDuration(duration) +
          "</div>";

        timelineEl.appendChild(el);
      });

      summaryEl.innerHTML =
        "<span>Free Time: <strong>" +
        formatDuration(payload.freeTime) +
        "</strong></span>" +
        "<span>Sleep: <strong>" +
        formatDuration(payload.sleepMins) +
        "</strong></span>";
    }

    function addRipple(event) {
      const button = event.currentTarget;
      const rect = button.getBoundingClientRect();
      const ripple = document.createElement("span");
      const size = Math.max(rect.width, rect.height);
      ripple.className = "ripple";
      ripple.style.width = size + "px";
      ripple.style.height = size + "px";
      ripple.style.left = event.clientX - rect.left - size / 2 + "px";
      ripple.style.top = event.clientY - rect.top - size / 2 + "px";
      button.appendChild(ripple);
      setTimeout(() => ripple.remove(), 560);
    }

    generateBtn.addEventListener("click", addRipple);

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const activities = Array.from(
        form.querySelectorAll('.activity-item input[type="checkbox"]:checked')
      ).map((el) => ({
        name: el.value,
        duration: Number(el.dataset.duration || 0),
        icon: el.dataset.icon || "⭐"
      }));

      const data = {
        wakeTime: document.getElementById("wakeTime").value,
        freshup: document.getElementById("freshup").value,
        startTime: document.getElementById("startTime").value,
        endTime: document.getElementById("endTime").value,
        morningTravel: document.getElementById("morningTravel").value,
        eveningTravel: document.getElementById("eveningTravel").value,
        activities
      };

      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="spinner"></span>Generating...';
      setState("loading");

      setTimeout(() => {
        const schedule = generateSchedule(data);
        renderResult(schedule);
        setState("result");
        generateBtn.disabled = false;
        generateBtn.innerHTML = "Generate AI Schedule";
      }, 1500);
    });
  </script>
</body>

</html>
